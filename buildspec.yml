version: 0.2

phases:
  install:
    runtime-versions:
      java: 17
    commands:
      - echo "Installing required dependencies..."
      - yum install -y git wget
      - curl -fsSL https://get.docker.com | sh

  pre_build:
    commands:
      - echo "Validating Java and Maven versions..."
      - java -version
      - mvn --version
      - echo "Running SonarCloud analysis..."
      - mvn sonar:sonar -Dsonar.projectKey=praveenmummella_car-rentals -Dsonar.organization=praveenmummella -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=$SONAR_TOKEN

  build:
    commands:
      - echo "Building the project..."
      - mvn clean package

  post_build:
    commands:
      - echo "Build and SonarCloud analysis completed successfully!"

artifacts:
  files:
    - target/*.jar
  discard-paths: yes

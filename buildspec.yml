version: 0.2

env:
  variables:
    SONAR_HOST_URL: "https://sonarcloud.io"
    SONAR_ORG: "praveenmummella"
    SONAR_PROJECT_KEY: "praveenmummella_car-rentals"
    S3_BUCKET_NAME: "your-s3-bucket-name"  # Change this to your actual S3 bucket

  parameter-store:
    SONAR_TOKEN: "/sonar/token"  # Fetching token from AWS Systems Manager Parameter Store

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Installing dependencies..."
      - yum update -y
      - yum install -y jq unzip
      - echo "Installing Docker..."
      - yum install -y docker
      - echo "Starting Docker daemon..."
      - nohup /usr/bin/dockerd &  # Run Docker daemon in the background
      - docker --version

pre_build:
    commands:
      - echo "Pre-build: Setting up environment"
      - mvn clean install  # Build project and install dependencies

build:
    commands:
      # ---------------------- SAST (SonarCloud) ---------------------- 
      - echo "Running SonarCloud analysis for SAST..."
      - mvn sonar:sonar -Dsonar.projectKey=$SONAR_PROJECT_KEY -Dsonar.organization=$SONAR_ORG -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN -X  # Verbose Logging

      # ---------------------- SCA (Dependency Check) ---------------------- 
      - echo "Running OWASP Dependency-Check for SCA..."
      - mvn org.owasp:dependency-check-maven:check -X  # Verbose Logging for Debugging
      - echo "Verifying OWASP report exists..."
      - ls -l target/dependency-check-report.*

      # ---------------------- Upload SCA Report to S3 ---------------------- 
      - echo "Uploading OWASP Dependency-Check reports to S3..."
      - aws s3 cp target/dependency-check-report.html s3://$S3_BUCKET_NAME/reports/dependency-check-report.html
      - aws s3 cp target/dependency-check-report.xml s3://$S3_BUCKET_NAME/reports/dependency-check-report.xml

post_build:
    commands:
      - echo "Build completed successfully."

artifacts:
  files:
    - '**/*'
  discard-paths: yes

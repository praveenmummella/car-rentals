version: 0.2

env:
  variables:
    SONAR_HOST_URL: "https://sonarcloud.io"
    SONAR_ORG: "praveenmummella"
    SONAR_PROJECT_KEY: "praveenmummella_car-rentals"

  secrets-manager:
    SONAR_TOKEN: "SonarCloudToken:SONAR_TOKEN"  # Ensure this matches your AWS Secrets Manager secret name

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Installing dependencies..."
      - yum update -y
      - yum install -y jq
      - echo "Installing Docker..."
      - yum install -y docker
      - echo "Starting Docker daemon..."
      - nohup /usr/bin/dockerd &  # Use nohup to run docker daemon in the background
      - docker --version

pre_build:
    commands:
      - echo "Pre-build: Setting up environment"
      - mvn clean install  # This line remains as it is

build:
    commands:
      - echo "Running SonarCloud analysis..."
      - mvn sonar:sonar -Dsonar.projectKey=$SONAR_PROJECT_KEY -Dsonar.organization=$SONAR_ORG -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN

post_build:
    commands:
      - echo "Build completed successfully."

artifacts:
  files:
    - '**/*'
  discard-paths: yes

version: 0.2

phases:
  install:
    runtime-versions:
      java: 17  # Upgrade to Java 17 for SonarCloud compatibility
  pre_build:
    commands:
      - echo "Installing required dependencies..."
      - java -version
      - mvn --version
  build:
    commands:
      - echo "Building project..."
      - mvn clean package
      - echo "Running JaCoCo Test Coverage..."
      - mvn test jacoco:report
      - echo "Running SonarCloud Analysis..."
      - mvn sonar:sonar -Dsonar.projectKey=your_project_key -Dsonar.organization=your_organization -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=$SONAR_TOKEN
  post_build:
    commands:
      - echo "Build and security scan completed successfully"

artifacts:
  files:
    - target/car-rentals*/*
  discard-paths: yes

cache:
  paths:
    - '/root/.m2/**/*'
